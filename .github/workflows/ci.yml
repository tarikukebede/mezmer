name: CI

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    validate:
        name: Validate (Node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: [20.19.0, 22.12.0]

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate AI contracts
              run: pnpm validate:contracts

            - name: Verify theme registry command
              run: pnpm theme:list

            - name: Theme script integration tests
              run: pnpm test:scripts

            - name: Lint
              run: pnpm lint

            - name: Type check
              run: pnpm tsc --noEmit

            - name: Unit tests
              run: pnpm test

            - name: Build
              run: pnpm build

    component-tests:
        name: Playwright CT
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22.12.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright Chromium
              run: pnpm exec playwright install --with-deps chromium

            - name: Run component tests
              run: pnpm test:ct

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report
                  if-no-files-found: ignore
